replicaCount: 2

image:
  repository: ghcr.io/grendel71/payment-processor
  pullPolicy: IfNotPresent
  tag: "sha-PLACEHOLDER"  # replaced with actual SHA in Task 6

database:
  existingSecret:
    name: paymentprocessor-db
    key: DATABASE_URL

migrations:
  enabled: true

podDisruptionBudget:
  enabled: true
  minAvailable: 1

autoscaling:
  enabled: false

networkPolicy:
  enabled: true
  ingress:
    namespaceSelector:
      kubernetes.io/metadata.name: envoy-gateway-system
    podSelector:
      app.kubernetes.io/name: envoy-gateway
  egress:
    dnsNamespaceSelector:
      kubernetes.io/metadata.name: kube-system
    dnsPodSelector:
      k8s-app: kube-dns
    database:
      podSelector:
        cnpg.io/cluster: payments-db
      namespaceSelector:
        kubernetes.io/metadata.name: payments
      port: 5432
