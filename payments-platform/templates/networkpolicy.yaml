{{- if .Values.networkPolicy.enabled }}
{{- $ingressNamespaceSelector := .Values.networkPolicy.ingress.namespaceSelector }}
{{- $ingressPodSelector := .Values.networkPolicy.ingress.podSelector }}
{{- $dnsNamespaceSelector := .Values.networkPolicy.egress.dnsNamespaceSelector }}
{{- $dnsPodSelector := .Values.networkPolicy.egress.dnsPodSelector }}
{{- $hasIngressNamespaceSelector := and (kindIs "map" $ingressNamespaceSelector) (gt (len $ingressNamespaceSelector) 0) }}
{{- $hasIngressPodSelector := and (kindIs "map" $ingressPodSelector) (gt (len $ingressPodSelector) 0) }}
{{- $hasDnsNamespaceSelector := and (kindIs "map" $dnsNamespaceSelector) (gt (len $dnsNamespaceSelector) 0) }}
{{- $hasDnsPodSelector := and (kindIs "map" $dnsPodSelector) (gt (len $dnsPodSelector) 0) }}
{{- if not (and $hasIngressNamespaceSelector $hasIngressPodSelector) }}
{{- fail "networkPolicy ingress requires namespaceSelector and podSelector" }}
{{- end }}
{{- if not $hasDnsNamespaceSelector }}
{{- fail "networkPolicy DNS egress requires dnsNamespaceSelector" }}
{{- end }}
{{- if not $hasDnsPodSelector }}
{{- fail "networkPolicy DNS egress requires dnsPodSelector" }}
{{- end }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "payments-platform.fullname" . }}
  labels:
    {{- include "payments-platform.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "payments-platform.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.ingress.namespaceSelector | nindent 14 }}
          podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.ingress.podSelector | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.targetPort }}
    {{- $monNsSelector := .Values.networkPolicy.ingressMonitoring.namespaceSelector }}
    {{- $monPodSelector := .Values.networkPolicy.ingressMonitoring.podSelector }}
    {{- if and (kindIs "map" $monNsSelector) (gt (len $monNsSelector) 0) (kindIs "map" $monPodSelector) (gt (len $monPodSelector) 0) }}
    - from:
        - namespaceSelector:
            matchLabels:
              {{- toYaml $monNsSelector | nindent 14 }}
          podSelector:
            matchLabels:
              {{- toYaml $monPodSelector | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.targetPort }}
    {{- end }}
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.egress.dnsNamespaceSelector | nindent 14 }}
          podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.egress.dnsPodSelector | nindent 14 }}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- $dbCidr := .Values.networkPolicy.egress.database.cidr }}
    {{- $dbPodSelector := .Values.networkPolicy.egress.database.podSelector }}
    {{- $dbNsSelector := .Values.networkPolicy.egress.database.namespaceSelector }}
    {{- if $dbCidr }}
    - to:
        - ipBlock:
            cidr: {{ $dbCidr | quote }}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.egress.database.port }}
    {{- else if and (kindIs "map" $dbPodSelector) (gt (len $dbPodSelector) 0) }}
    - to:
        - namespaceSelector:
            matchLabels:
              {{- toYaml ($dbNsSelector | default dict) | nindent 14 }}
          podSelector:
            matchLabels:
              {{- toYaml $dbPodSelector | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.egress.database.port }}
    {{- end }}
{{- if .Values.migrations.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "payments-platform.migrationJobName" . }}
  labels:
    {{- include "payments-platform.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "payments-platform.name" . }}-migration
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: migration
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.egress.dnsNamespaceSelector | nindent 14 }}
          podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.egress.dnsPodSelector | nindent 14 }}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- $dbCidr := .Values.networkPolicy.egress.database.cidr }}
    {{- $dbPodSelector := .Values.networkPolicy.egress.database.podSelector }}
    {{- $dbNsSelector := .Values.networkPolicy.egress.database.namespaceSelector }}
    {{- if $dbCidr }}
    - to:
        - ipBlock:
            cidr: {{ $dbCidr | quote }}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.egress.database.port }}
    {{- else if and (kindIs "map" $dbPodSelector) (gt (len $dbPodSelector) 0) }}
    - to:
        - namespaceSelector:
            matchLabels:
              {{- toYaml ($dbNsSelector | default dict) | nindent 14 }}
          podSelector:
            matchLabels:
              {{- toYaml $dbPodSelector | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.egress.database.port }}
    {{- end }}
{{- end }}
{{- end }}
