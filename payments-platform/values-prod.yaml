replicaCount: 3

image:
  repository: registry.example.com/payments/paymentprocessor
  pullPolicy: IfNotPresent
  tag: "0.1.0"

database:
  existingSecret:
    name: paymentprocessor-db
    key: DATABASE_URL

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 2

networkPolicy:
  enabled: true
  ingress:
    namespaceSelector:
      kubernetes.io/metadata.name: ingress-nginx
    podSelector:
      app.kubernetes.io/name: ingress-nginx
  egress:
    dnsNamespaceSelector:
      kubernetes.io/metadata.name: kube-system
    dnsPodSelector:
      k8s-app: kube-dns
    database:
      cidr: "203.0.113.10/32"
      port: 5432

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: payments.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: payments-platform-tls
      hosts:
        - payments.example.com
