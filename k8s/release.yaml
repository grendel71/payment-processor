apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: payments-platform
  namespace: payments
spec:
  interval: 30m
  chart:
    spec:
      chart: ./payments-platform
      sourceRef:
        kind: GitRepository
        name: payment-processor
        namespace: flux-system
      interval: 5m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  valuesFrom:
    - kind: GitRepository
      name: payment-processor
      namespace: flux-system
      valuesKey: payments-platform/values-talos.yaml
